<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Place Your Order</title>
  <style>
    :root {
      --bg: #fbf7ef;
      --paper: #fffdf8;
      --accent: #6f3ff5;
      --accent-dark: #5a2fd4;
      --border: #d8cbb9;
      --text: #2a2418;
      --muted: #6b5f4e;
      --banner-bg: #f5efe3;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .page {
      max-width: 52rem;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
    }

    .banner {
      background: var(--banner-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0.875rem 1.125rem;
      margin-bottom: 1.5rem;
      font-size: 0.9375rem;
      color: var(--muted);
    }

    .banner strong {
      color: var(--text);
    }

    .card {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 2rem;
      box-shadow: 0 12px 40px rgba(42, 36, 24, 0.08);
    }

    header {
      margin-bottom: 2rem;
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(1.75rem, 4vw, 2.25rem);
      color: var(--accent);
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    fieldset {
      border: 1px solid var(--border);
      border-radius: 20px;
      margin: 0 0 1.5rem;
      padding: 1.25rem 1.5rem 1.5rem;
      background: rgba(255, 253, 248, 0.6);
    }

    legend {
      font-weight: 600;
      font-size: 1.0625rem;
      color: var(--text);
      padding: 0 0.375rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem 1.25rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
    }

    .field--full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
    }

    .optional {
      font-weight: 400;
      color: var(--muted);
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    input[type="date"] {
      width: 100%;
      padding: 0.75rem 0.875rem;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
      font: inherit;
      color: var(--text);
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    input::placeholder {
      color: #a89882;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(111, 63, 245, 0.15);
    }

    .checkbox-field {
      display: flex;
      align-items: flex-start;
      gap: 0.625rem;
      margin-bottom: 0.75rem;
    }

    .checkbox-field:last-child {
      margin-bottom: 0;
    }

    .checkbox-field input[type="checkbox"] {
      width: 1.125rem;
      height: 1.125rem;
      margin-top: 0.2rem;
      accent-color: var(--accent);
      flex-shrink: 0;
    }

    .checkbox-field label {
      font-weight: 400;
      cursor: pointer;
    }

    .actions {
      margin-top: 0.5rem;
    }

    button[type="submit"] {
      display: inline-block;
      width: 100%;
      padding: 0.9375rem 1.5rem;
      border: none;
      border-radius: 999px;
      font: inherit;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
      box-shadow: 0 8px 24px rgba(111, 63, 245, 0.3);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    button[type="submit"]:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 28px rgba(111, 63, 245, 0.35);
    }

    button[type="submit"]:active {
      transform: translateY(0);
    }

    @media (max-width: 640px) {
      .page {
        padding: 1.25rem 1rem 2rem;
      }

      .card {
        padding: 1.25rem;
        border-radius: 20px;
      }

      fieldset {
        padding: 1rem;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .field--full {
        grid-column: auto;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="banner" role="note">
      <strong>Demo only.</strong> This form collects mock payment details for a UX challenge — nothing is charged or stored securely.
    </div>

    <div class="card">
      <header>
        <h1>Place your order</h1>
        <p class="subtitle">Fill in your details below. All fields marked with required validation must be completed.</p>
      </header>

      <!-- Native HTML POST — no JavaScript required -->
      <form action="/submit-order" method="POST">
        <fieldset>
          <legend>Customer Info</legend>
          <div class="grid">
            <div class="field field--full">
              <label for="fullName">Full name</label>
              <input
                type="text"
                id="fullName"
                name="fullName"
                required
                autocomplete="name"
                placeholder="Jane Doe"
              >
            </div>
            <div class="field">
              <label for="email">Email address</label>
              <input
                type="email"
                id="email"
                name="email"
                required
                autocomplete="email"
                inputmode="email"
                placeholder="jane@example.com"
              >
            </div>
            <div class="field">
              <label for="phone">Phone number</label>
              <input
                type="tel"
                id="phone"
                name="phone"
                required
                autocomplete="tel"
                inputmode="tel"
                placeholder="(555) 123-4567"
              >
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>Shipping</legend>
          <div class="grid">
            <div class="field field--full">
              <label for="shippingAddress">Shipping address</label>
              <input
                type="text"
                id="shippingAddress"
                name="shippingAddress"
                required
                autocomplete="shipping street-address"
                placeholder="123 Main St, City, ST 12345"
              >
            </div>
            <div class="field">
              <label for="preferredDeliveryDate">Preferred delivery date</label>
              <input
                type="date"
                id="preferredDeliveryDate"
                name="preferredDeliveryDate"
                required
              >
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>Payment Details</legend>
          <div class="grid">
            <div class="field field--full">
              <label for="cardNumber">Card number</label>
              <input
                type="text"
                id="cardNumber"
                name="cardNumber"
                required
                autocomplete="cc-number"
                inputmode="numeric"
                placeholder="4111 1111 1111 1111"
              >
            </div>
            <div class="field">
              <label for="expiration">Expiration</label>
              <input
                type="text"
                id="expiration"
                name="expiration"
                required
                autocomplete="cc-exp"
                inputmode="numeric"
                placeholder="MM/YY"
              >
            </div>
            <div class="field">
              <label for="cvv">CVV</label>
              <input
                type="text"
                id="cvv"
                name="cvv"
                required
                autocomplete="cc-csc"
                inputmode="numeric"
                placeholder="123"
                maxlength="4"
              >
            </div>
            <div class="field field--full">
              <label for="billingAddress">Billing address</label>
              <input
                type="text"
                id="billingAddress"
                name="billingAddress"
                required
                autocomplete="billing street-address"
                placeholder="Same as shipping or enter a different address"
              >
            </div>
            <div class="field field--full">
              <label for="discountCode">Discount code <span class="optional">(optional)</span></label>
              <input
                type="text"
                id="discountCode"
                name="discountCode"
                autocomplete="off"
                placeholder="SAVE10"
              >
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>Consent</legend>
          <div class="checkbox-field">
            <input
              type="checkbox"
              id="acceptTerms"
              name="acceptTerms"
              value="yes"
              required
            >
            <label for="acceptTerms">I agree to the terms of service and privacy policy.</label>
          </div>
          <div class="checkbox-field">
            <input
              type="checkbox"
              id="optInUpdates"
              name="optInUpdates"
              value="yes"
            >
            <label for="optInUpdates">Send me product updates and promotional emails.</label>
          </div>
        </fieldset>

        <div class="actions">
          <button type="submit">Submit order</button>
        </div>
      </form>
    </div>
  </main>
</body>
</html>
