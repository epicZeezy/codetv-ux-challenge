<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Place Your Order</title>
  <style>
    :root {
      --bg: #fbf7ef;
      --paper: #fffdf8;
      --accent: #6f3ff5;
      --accent-dark: #5a2fd4;
      --border: #d8cbb9;
      --text: #2a2418;
      --muted: #6b5f4e;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .page {
      max-width: 52rem;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
    }

    .card {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 2rem;
      box-shadow: 0 12px 40px rgba(42, 36, 24, 0.08);
    }

    header {
      margin-bottom: 2rem;
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(1.75rem, 4vw, 2.25rem);
      color: var(--accent);
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    @keyframes gradientMove {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    fieldset {
      border: 1px solid var(--border);
      border-radius: 20px;
      margin: 0 0 1.5rem;
      padding: 1.25rem 1.5rem 1.5rem;
      background: rgba(255, 253, 248, 0.6);
      background-size: 200% 200%;
      transition: background 0.4s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }

    legend {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 600;
      font-size: 1.0625rem;
      color: var(--text);
      padding: 0 0.375rem;
    }

    legend::after {
      display: inline-block;
      font-size: 1.25rem;
      line-height: 1;
      opacity: 0;
      transform: scale(0.5);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    fieldset:focus-within legend::after {
      opacity: 1;
      transform: scale(1);
    }

    .section-customer:focus-within {
      border-color: #c4a0f0;
      box-shadow: 0 0 0 3px rgba(196, 160, 240, 0.2);
      background: linear-gradient(135deg, #e8d5ff, #d4b8ff, #e8d5ff);
      animation: gradientMove 4s ease infinite;
    }

    .section-customer legend::after {
      content: "\1F464";
    }

    .section-customer:focus-within input:focus {
      border-color: #9b6fd4;
      box-shadow: 0 0 0 3px rgba(155, 111, 212, 0.18);
    }

    .section-shipping:focus-within {
      border-color: #8ecae6;
      box-shadow: 0 0 0 3px rgba(142, 202, 230, 0.2);
      background: linear-gradient(135deg, #d0f0ff, #b8e8d4, #d0f0ff);
      animation: gradientMove 4s ease infinite;
    }

    .section-shipping legend::after {
      content: "\1F69A";
    }

    .section-shipping:focus-within input:focus {
      border-color: #5ba8c9;
      box-shadow: 0 0 0 3px rgba(91, 168, 201, 0.18);
    }

    .section-payment:focus-within {
      border-color: #8fd4a0;
      box-shadow: 0 0 0 3px rgba(143, 212, 160, 0.2);
      background: linear-gradient(135deg, #d4f5d4, #b8e8c8, #d4f5d4);
      animation: gradientMove 4s ease infinite;
    }

    .section-payment legend::after {
      content: "\1F4B5";
    }

    .section-payment:focus-within input:focus {
      border-color: #5cb878;
      box-shadow: 0 0 0 3px rgba(92, 184, 120, 0.18);
    }

    .section-consent:focus-within {
      border-color: #e8c86a;
      box-shadow: 0 0 0 3px rgba(232, 200, 106, 0.2);
      background: linear-gradient(135deg, #fff3d0, #ffe8a0, #fff3d0);
      animation: gradientMove 4s ease infinite;
    }

    .section-consent legend::after {
      content: "\1F6E1";
    }

    .section-consent:focus-within input[type="checkbox"]:focus {
      outline: 2px solid #c9a84a;
      outline-offset: 2px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem 1.25rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
    }

    .field--full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
    }

    .optional {
      font-weight: 400;
      color: var(--muted);
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    input[type="date"] {
      width: 100%;
      padding: 0.75rem 0.875rem;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
      font: inherit;
      color: var(--text);
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    input::placeholder {
      color: #a89882;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(111, 63, 245, 0.15);
    }

    .checkbox-field {
      display: flex;
      align-items: flex-start;
      gap: 0.625rem;
      margin-bottom: 0.75rem;
    }

    .checkbox-field:last-child {
      margin-bottom: 0;
    }

    .checkbox-field input[type="checkbox"] {
      width: 1.125rem;
      height: 1.125rem;
      margin-top: 0.2rem;
      accent-color: var(--accent);
      flex-shrink: 0;
    }

    .checkbox-field label {
      font-weight: 400;
      cursor: pointer;
    }

    .actions {
      margin-top: 0.5rem;
    }

    button[type="submit"] {
      display: inline-block;
      width: 100%;
      padding: 0.9375rem 1.5rem;
      border: none;
      border-radius: 999px;
      font: inherit;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
      box-shadow: 0 8px 24px rgba(111, 63, 245, 0.3);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    button[type="submit"]:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 28px rgba(111, 63, 245, 0.35);
    }

    button[type="submit"]:active {
      transform: translateY(0);
    }

    @media (prefers-reduced-motion: reduce) {
      fieldset:focus-within {
        animation: none;
      }

      legend::after {
        transition: none;
      }

      fieldset:focus-within legend::after {
        opacity: 1;
        transform: none;
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 1.25rem 1rem 2rem;
      }

      .card {
        padding: 1.25rem;
        border-radius: 20px;
      }

      fieldset {
        padding: 1rem;
      }

      legend::after {
        font-size: 1.0625rem;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .field--full {
        grid-column: auto;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="card">
      <header>
        <h1>Place your order</h1>
        <p class="subtitle">Fill in your details below. All fields marked with required validation must be completed.</p>
      </header>

      <!-- Native HTML POST — no JavaScript required -->
      <form action="/submit-order" method="POST">
        <fieldset class="section-customer">
          <legend>Customer Info</legend>
          <div class="grid">
            <div class="field field--full">
              <label for="fullName">Full name</label>
              <input
                type="text"
                id="fullName"
                name="fullName"
                required
                autocomplete="name"
                placeholder="Jane Doe"
              >
            </div>
            <div class="field">
              <label for="email">Email address</label>
              <input
                type="email"
                id="email"
                name="email"
                required
                autocomplete="email"
                inputmode="email"
                placeholder="jane@example.com"
              >
            </div>
            <div class="field">
              <label for="phone">Phone number <span class="optional">(optional)</span></label>
              <input
                type="tel"
                id="phone"
                name="phone"
                autocomplete="tel"
                inputmode="tel"
                placeholder="(555) 123-4567"
              >
            </div>
          </div>
        </fieldset>

        <fieldset class="section-shipping">
          <legend>Shipping</legend>
          <div class="grid">
            <div class="field field--full">
              <label for="shippingAddress">Shipping address</label>
              <input
                type="text"
                id="shippingAddress"
                name="shippingAddress"
                required
                autocomplete="shipping street-address"
                placeholder="123 Main St, City, ST 12345"
              >
            </div>
            <div class="field">
              <label for="preferredDeliveryDate">Preferred delivery date</label>
              <input
                type="date"
                id="preferredDeliveryDate"
                name="preferredDeliveryDate"
                required
                min="__DELIVERY_MIN__"
              >
            </div>
          </div>
        </fieldset>

        <fieldset class="section-payment">
          <legend>Payment Details</legend>
          <div class="grid">
            <div class="field field--full">
              <label for="cardNumber">Card number</label>
              <input
                type="text"
                id="cardNumber"
                name="cardNumber"
                required
                autocomplete="cc-number"
                inputmode="numeric"
                placeholder="4111 1111 1111 1111"
              >
            </div>
            <div class="field">
              <label for="expiration">Expiration</label>
              <input
                type="text"
                id="expiration"
                name="expiration"
                required
                autocomplete="cc-exp"
                inputmode="numeric"
                placeholder="MM/YY"
                maxlength="5"
                pattern="(0[1-9]|1[0-2])\/[0-9]{2}"
                title="Enter expiration as MM/YY (must not be in the past)"
              >
            </div>
            <div class="field">
              <label for="cvv">CVV</label>
              <input
                type="text"
                id="cvv"
                name="cvv"
                required
                autocomplete="cc-csc"
                inputmode="numeric"
                placeholder="123"
                maxlength="4"
              >
            </div>
            <div class="field field--full">
              <label for="billingAddress">Billing address</label>
              <input
                type="text"
                id="billingAddress"
                name="billingAddress"
                required
                autocomplete="billing street-address"
                placeholder="Same as shipping or enter a different address"
              >
            </div>
            <div class="field field--full">
              <label for="discountCode">Discount code <span class="optional">(optional)</span></label>
              <input
                type="text"
                id="discountCode"
                name="discountCode"
                autocomplete="off"
                placeholder="SAVE10"
              >
            </div>
          </div>
        </fieldset>

        <fieldset class="section-consent">
          <legend>Consent</legend>
          <div class="checkbox-field">
            <input
              type="checkbox"
              id="acceptTerms"
              name="acceptTerms"
              value="yes"
              required
            >
            <label for="acceptTerms">I agree to the terms of service and privacy policy.</label>
          </div>
          <div class="checkbox-field">
            <input
              type="checkbox"
              id="optInUpdates"
              name="optInUpdates"
              value="yes"
            >
            <label for="optInUpdates">Send me product updates and promotional emails.</label>
          </div>
        </fieldset>

        <div class="actions">
          <button type="submit">Submit order</button>
        </div>
      </form>
    </div>
  </main>
</body>
</html>
